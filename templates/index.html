<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>♟️ Шахматные задачи</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #e9ecef; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .app { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); text-align: center; max-width: 420px; width: 100%; }
        h1 { margin: 0 0 10px; color: #333; }
        #board { display: grid; grid-template-columns: repeat(8, 1fr); width: 320px; margin: 15px auto; border: 3px solid #2c3e50; }
        .sq { width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; font-size: 26px; user-select: none; }
        .l { background: #f0d9b5; } .d { background: #b58863; }
        .meta { font-size: 1.05em; margin: 10px 0; color: #555; min-height: 1.4em; }
        input { padding: 10px; font-size: 16px; width: 75%; margin: 5px 0; border: 1px solid #ccc; border-radius: 6px; }
        button { padding: 10px 18px; font-size: 15px; cursor: pointer; border: none; border-radius: 6px; margin: 5px; transition: 0.2s; }
        .btn-check { background: #3498db; color: #fff; }
        .btn-next { background: #2ecc71; color: #fff; }
        button:disabled { background: #bdc3c7; cursor: not-allowed; }
        button:hover:not(:disabled) { opacity: 0.9; }
        #msg { margin-top: 10px; font-weight: bold; min-height: 20px; }
        .ok { color: #27ae60; } .err { color: #e74c3c; }
    </style>
</head>
<body>
    <div class="app">
        <h1>♟️ Тренажёр задач</h1>
        <div id="meta" class="meta">Загрузка...</div>
        <div id="board"></div>
        <input type="text" id="inp" placeholder="Ход в SAN (напр. e4, Nf3, Qxf7#)">
        <br>
        <button class="btn-check" onclick="check()">Проверить</button>
        <button class="btn-next" onclick="next()" id="btnNext" disabled>Далее ➡️</button>
        <div id="msg"></div>
    </div>

    <script>
        let currentIdx = 0, currentFen = "";
        const sym = {K:'♔',Q:'♕',R:'♖',B:'♗',N:'♘',P:'♙',k:'♚',q:'♛',r:'♜',b:'♝',n:'♞',p:'♟'};

        async function load() {
            const res = await fetch(`/api/puzzle/${currentIdx}`);
            const d = await res.json();
            if (d.finished) {
                document.getElementById("meta").innerText = "🎉 Все задачи решены!";
                document.getElementById("board").innerHTML = "";
                document.getElementById("inp").disabled = true;
                return;
            }
            currentFen = d.fen;
            document.getElementById("meta").innerText = `${d.description} (${currentIdx + 1}/${d.total})`;
            render(currentFen);
            document.getElementById("msg").innerText = "";
            document.getElementById("inp").value = "";
            document.getElementById("inp").disabled = false;
            document.getElementById("btnNext").disabled = true;
        }

        function render(fen) {
            const b = document.getElementById("board");
            b.innerHTML = "";
            const ranks = fen.split(' ')[0].split('/');
            const sqs = [];
            ranks.forEach(r => { for(let c of r) isNaN(c) ? sqs.push(sym[c]) : sqs.push(...Array(+c).fill(null)); });
            for(let i=0;i<64;i++){
                const div = document.createElement("div");
                const row=Math.floor(i/8), col=i%8;
                div.className = `sq ${(row+col)%2===0?'l':'d'}`;
                div.innerText = sqs[i] || "";
                b.appendChild(div);
            }
        }

        async function check() {
            const m = document.getElementById("inp").value.trim();
            if(!m) return;
            document.getElementById("inp").disabled = true;
            document.getElementById("msg").innerText = "⏳ Проверка...";
            
            const res = await fetch("/api/validate", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({fen: currentFen, move: m, idx: currentIdx})
            });
            const d = await res.json();
            const msg = document.getElementById("msg");
            msg.innerText = d.message;
            msg.className = d.success ? "ok" : "err";

            if(d.success) {
                document.getElementById("btnNext").disabled = false;
                render(d.new_fen);
                document.getElementById("inp").disabled = true;
            } else {
                document.getElementById("inp").disabled = false;
                document.getElementById("inp").focus();
            }
        }

        function next() { currentIdx++; load(); }
        document.getElementById("inp").addEventListener("keypress", e => e.key==="Enter" && check());
        window.onload = load;
    </script>
</body>
</html>
